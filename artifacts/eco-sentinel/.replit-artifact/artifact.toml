kind = "web"
previewPath = "/"
title = "EcoSentinel"
version = "1.0.0"
id = "artifacts/eco-sentinel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 8080

[services.development]
run = "python app.py"

[services.env]
PORT = "8080"

[services.production]

[services.production.run]
args = ["python", "artifacts/eco-sentinel/app.py"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api"
